<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Bullying | Uma Experiência Interativa</title>
    
    <!-- Importação de Fontes Premium (Google Fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    
    <!-- Chart.js para o Gráfico -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configuração do Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        title: ['Montserrat', 'sans-serif'],
                    },
                    colors: {
                        brand: '#E50914',
                        dark: '#050505'
                    }
                }
            }
        }
    </script>
    
    <!-- Estilos Customizados e Animações -->
    <style>
        /* Ocultar scrollbar mas manter funcionalidade */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Animações Premium */
        @keyframes revealUp {
            0% { opacity: 0; transform: translateY(30px); filter: blur(10px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        
        @keyframes slideInLeft {
            0% { opacity: 0; transform: translateX(-40px); }
            100% { opacity: 1; transform: translateX(0); }
        }
        
        @keyframes scaleIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        .anim-reveal-up { animation: revealUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .anim-slide-left { animation: slideInLeft 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .anim-scale-in { animation: scaleIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        
        /* Atrasos para criar efeito em cascata (stagger) */
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }

        /* Container de Vídeo para cobrir toda a área sem bordas pretas */
        .video-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300vw;
            height: 300vh;
            transform: translate(-50%, -50%);
            pointer-events: none; /* Impede clique no vídeo */
            z-index: 0;
        }
        
        @media (min-width: 768px) {
            .video-wrapper {
                width: 150vw;
                height: 150vh;
            }
        }

        /* Efeito de Vidro (Glassmorphism) */
        .glass-panel {
            background: linear-gradient(135deg, rgba(20,20,20,0.6) 0%, rgba(0,0,0,0.8) 100%);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        /* Barra de Progresso */
        .progress-bar-container {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 50;
        }
        
        .progress-bar {
            height: 100%;
            background: #E50914;
            width: 0%;
            transition: width 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 0 10px #E50914;
        }
    </style>
</head>
<body class="min-h-[100dvh] bg-black font-sans text-white flex items-center justify-center p-0 md:p-6 lg:p-10 relative overflow-hidden selection:bg-brand/40">

    <!-- Efeito de textura/ruído por cima do vídeo para um ar mais cinemático -->
    <div class="absolute inset-0 z-10 pointer-events-none opacity-[0.03]" style="background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22/%3E%3C/svg%3E');"></div>

    <!-- CONTAINER PRINCIPAL -->
    <div class="relative z-20 w-full h-[100dvh] md:h-[85vh] md:max-w-[1400px] md:min-h-[750px] bg-dark md:rounded-3xl overflow-hidden shadow-[0_0_100px_rgba(0,0,0,0.8)] border-0 md:border border-white/10 flex flex-col">
        
        <!-- BARRA DE PROGRESSO -->
        <div class="progress-bar-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        
        <!-- BACKGROUNDS (VÍDEOS) -->
        <div id="video-container" class="absolute inset-0 z-0 bg-dark overflow-hidden">
            <!-- Os vídeos (iframes) serão injetados aqui via JS para transição suave -->
            
            <!-- Degradês para garantir leitura perfeita do texto -->
            <div class="absolute inset-0 bg-gradient-to-r from-black via-black/80 to-transparent w-full md:w-[60%] z-10 pointer-events-none"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-black/30 h-full z-10 opacity-90 pointer-events-none"></div>
        </div>

        <!-- LOGOTIPO / IDENTIFICAÇÃO -->
        <div class="absolute top-6 left-6 md:top-10 md:left-12 z-50 flex items-center gap-3 pointer-events-none">
            <div class="relative flex h-3 w-3">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-brand opacity-75"></span>
              <span class="relative inline-flex rounded-full h-3 w-3 bg-brand shadow-[0_0_10px_#E50914]"></span>
            </div>
            <span class="text-xs md:text-sm font-bold tracking-[0.3em] text-white/80 font-title">PROJETO BULLYING</span>
        </div>

        <!-- ÁREA DE CONTEÚDO E NAVEGAÇÃO -->
        <div class="relative z-20 flex-1 flex flex-col md:flex-row px-6 md:px-12 pt-24 pb-8 md:pb-12 h-full justify-between overflow-hidden">
            
            <!-- ESQUERDA: Texto e Gráficos -->
            <div class="flex-1 flex flex-col justify-center w-full max-w-full md:max-w-[55%] lg:max-w-[650px] relative">
                
                <div id="content-wrapper" class="opacity-0"> <!-- Container para forçar reflow de animação -->
                    
                    <!-- Badge -->
                    <div class="flex items-center gap-3 mb-4 anim-reveal-up delay-100 opacity-0">
                        <span id="slide-badge" class="bg-brand/20 backdrop-blur-md border border-brand/30 px-4 py-1.5 rounded-full text-[10px] md:text-xs font-bold text-brand uppercase tracking-widest shadow-sm font-title">
                            <!-- Badge Injetada -->
                        </span>
                    </div>
                    
                    <!-- Título -->
                    <h1 id="slide-title" class="font-title text-4xl sm:text-5xl md:text-6xl lg:text-[4rem] font-black text-white uppercase leading-[1.05] tracking-tight drop-shadow-2xl anim-reveal-up delay-200 opacity-0 mb-6">
                        <!-- Título Injetado -->
                    </h1>
                    
                    <!-- Descrição Premium (Glass Panel) -->
                    <div class="glass-panel rounded-2xl p-6 md:p-8 anim-reveal-up delay-300 opacity-0 relative overflow-hidden group">
                        <div class="absolute top-0 left-0 w-1 h-full bg-brand"></div> <!-- Linha de destaque lateral -->
                        <div id="slide-desc" class="text-gray-300 text-sm sm:text-base md:text-lg leading-relaxed font-light">
                            <!-- Descrição Injetada -->
                        </div>
                    </div>

                    <!-- Dica de Teclado -->
                    <div class="mt-8 hidden sm:flex items-center gap-3 text-gray-500 text-xs font-medium anim-reveal-up delay-400 opacity-0">
                        <div class="flex gap-1">
                            <kbd class="bg-white/5 px-2 py-1 rounded border border-white/10 shadow-sm">←</kbd>
                            <kbd class="bg-white/5 px-2 py-1 rounded border border-white/10 shadow-sm">→</kbd>
                        </div>
                        <span>Use as setas para navegar na apresentação</span>
                    </div>

                </div>
            </div>

            <!-- DIREITA: Lista de Thumbnails -->
            <div id="thumbnails-container" class="w-full md:w-[360px] flex flex-row md:flex-col gap-4 overflow-x-auto md:overflow-x-hidden md:overflow-y-auto scrollbar-hide py-4 md:py-0 md:pl-8 items-center md:items-end justify-start md:justify-center mt-auto md:mt-0 relative z-30 shrink-0">
                <!-- Cartões serão injetados aqui -->
            </div>

        </div>
    </div>

    <script>
        /**
         * DADOS DOS SLIDES
         * O parâmetro 'videoId' contém o ID do YouTube.
         * Escolhi IDs de vídeos de fundo cinemáticos/abstractos que combinam com os temas.
         * Podes substituir estes IDs pelos vídeos explicativos que gravares.
         */
        const slidesData = [
            {
                badge: "Apresentação",
                title: "CRIADO POR MIGUEL E GABRIEL",
                description: "Bem-vindos ao nosso projeto escolar. Navegue pela lista ao lado para mergulhar no nosso estudo sobre o Bullying: o que é, como identificar os sinais, as consequências e como ajudar.<br><br><div class='mt-4 flex flex-col gap-2'><a href='mailto:miguel-rmontana@estudante.rs.gov.br' class='text-white/70 hover:text-brand transition-colors text-sm flex items-center gap-2'><svg class='w-4 h-4' fill='none' stroke='currentColor' viewBox='0 0 24 24'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z'></path></svg> miguel-rmontana@estudante.rs.gov.br</a><a href='mailto:gabriel-efdslopes@estudante.rs.gov.br' class='text-white/70 hover:text-brand transition-colors text-sm flex items-center gap-2'><svg class='w-4 h-4' fill='none' stroke='currentColor' viewBox='0 0 24 24'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z'></path></svg> gabriel-efdslopes@estudante.rs.gov.br</a></div>",
                videoId: "FBNgrF7Smgg",
                bgFallback: "https://images.unsplash.com/photo-1529070538774-1843cb3265df?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80"
            },
            {
                badge: "Capítulo 1",
                title: "O QUE É O BULLYING?",
                description: "O bullying é um conjunto de atos de violência física ou psicológica, intencionais e repetidos. Ocorre numa relação de desequilíbrio de poder, causando angústia e sofrimento à vítima. Não é apenas uma 'brincadeira', é uma forma de agressão séria.",
                videoId: "v-5TfJ39sC0",
                bgFallback: "https://images.unsplash.com/photo-1506869640319-fe1a24fd76dc?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80"
            },
            {
                badge: "Capítulo 2",
                title: "TIPOS DE AGRESSÃO",
                description: "As agressões vão muito além do contacto físico. Podem ser <strong>verbais</strong> (insultos), <strong>relacionais</strong> (exclusão social) ou <strong>Cyberbullying</strong> — o assédio através da internet que persegue a vítima 24 horas por dia, até dentro do seu próprio quarto.",
                videoId: "psieH5qBIpk",
                bgFallback: "https://images.unsplash.com/photo-1614064641913-6b7140414c71?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80"
            },
            {
                badge: "Estatísticas",
                title: "DADOS NO BRASIL",
                description: "No Brasil, os casos de bullying nas escolas continuam a crescer. O gráfico abaixo ilustra as formas mais comuns de agressão reportadas pelos estudantes.<br><br><div class='relative w-full h-48 mt-4 bg-black/40 rounded-xl border border-white/5 p-2'><canvas id='bullyingChart'></canvas></div>",
                videoId: "falttTt_MZU",
                bgFallback: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80",
                hasChart: true
            },
            {
                badge: "Capítulo 3",
                title: "SINAIS DE ALERTA",
                description: "Muitas vítimas sofrem em absoluto silêncio. Fique atento a mudanças repentinas: tristeza profunda, isolamento social, queda acentuada no rendimento escolar, perturbações no sono ou desculpas frequentes para faltar às aulas.",
                videoId: "iHDOPKKDozc",
                bgFallback: "https://images.unsplash.com/photo-1488528656683-11f8100913a8?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80"
            },
            {
                badge: "Capítulo 4",
                title: "CONSEQUÊNCIAS",
                description: "As marcas deixadas podem durar uma vida inteira. O impacto afeta severamente o desenvolvimento, gerando transtornos de ansiedade, depressão, baixa autoestima e, em casos extremos, ideação suicida. O trauma é real.",
                videoId: "DK-qeFsMA_U",
                bgFallback: "https://images.unsplash.com/photo-1512805981445-3162b4859a85?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80"
            },
            {
                badge: "Capítulo 5",
                title: "PROCURAR APOIO",
                description: "A prevenção é responsabilidade de toda a comunidade. Se está a sofrer ou conhece alguém que esteja, <strong>quebre o silêncio!</strong> Fale com um adulto de confiança ou ligue para linhas de apoio. Pedir ajuda não é fraqueza, é coragem.",
                videoId: "DmsTiMdkzsU",
                bgFallback: "https://images.unsplash.com/photo-1520694478166-daaaaec95b69?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80"
            },
            {
                badge: "Encerramento",
                title: "MUITO OBRIGADO!",
                description: "Chegámos ao fim da nossa apresentação. Esperamos que este projeto ajude a consciencializar sobre a importância do respeito e da empatia. O combate ao bullying começa com cada um de nós!<br><br><div class='mt-6 p-4 bg-brand/10 border border-brand/20 rounded-xl text-center'><span class='text-brand text-sm font-bold uppercase tracking-widest font-title'>Projeto desenvolvido por</span><br><span class='text-white text-xl font-black mt-1 inline-block'>Miguel e Gabriel</span></div>",
                videoId: "J---aiyznGQ",
                playSound: true, // Propriedade nova para ligar o som apenas neste
                bgFallback: "https://images.unsplash.com/photo-1529156069898-49953eb1b5ce?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80"
            }
        ];

        let currentSlide = 0;
        let chartInstance = null;

        function initApp() {
            const videoContainer = document.getElementById('video-container');
            const thumbContainer = document.getElementById('thumbnails-container');

            let videosHTML = '';
            let thumbsHTML = '';

            slidesData.forEach((slide, index) => {
                // 1. Criar os IFrames de Vídeo para cada slide (todos pré-carregados mas invisíveis)
                // Usamos parâmetros para autoplay, mute, loop, sem controlos e sem logo do youtube
                // ATUALIZAÇÃO: Todos começam com mute=1 e adicionámos enablejsapi=1 para controlar o som via código
                videosHTML += `
                    <div id="video-slide-${index}" class="absolute inset-0 transition-opacity duration-1000 ease-in-out z-0 opacity-0">
                        <iframe id="iframe-slide-${index}" class="video-wrapper" 
                            src="https://www.youtube.com/embed/${slide.videoId}?autoplay=1&mute=1&controls=0&loop=1&playlist=${slide.videoId}&modestbranding=1&showinfo=0&rel=0&playsinline=1&enablejsapi=1" 
                            frameborder="0" 
                            allow="autoplay; encrypted-media" 
                            allowfullscreen>
                        </iframe>
                    </div>
                `;

                // 2. Criar os Thumbnails Laterais (Design Glassmorphism)
                thumbsHTML += `
                    <div id="thumb-${index}" onclick="changeSlide(${index})" class="group relative w-[160px] h-[90px] sm:w-[200px] sm:h-[110px] md:w-[280px] md:h-[120px] rounded-xl overflow-hidden cursor-pointer flex-shrink-0 transition-all duration-500 ease-out border border-white/10 opacity-60 hover:opacity-100 hover:scale-[1.03] transform bg-black/50 backdrop-blur-md">
                        
                        <!-- Imagem de Fundo (Fallback visual) -->
                        <img src="${slide.bgFallback}" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 opacity-40 mix-blend-overlay">
                        
                        <div class="absolute inset-0 transition-colors duration-300 bg-gradient-to-r from-black/80 to-transparent"></div>
                        
                        <!-- Conteúdo do Thumbnail -->
                        <div class="absolute inset-0 flex flex-col justify-center p-4">
                            <span class="text-brand text-[10px] font-bold uppercase tracking-widest mb-1">${slide.badge}</span>
                            <h3 class="font-title text-white text-xs md:text-sm font-bold line-clamp-2 leading-tight drop-shadow-md">${slide.title}</h3>
                        </div>

                        <!-- Número e Ícone de Play -->
                        <div class="absolute right-3 bottom-3 flex items-center gap-2">
                            <div class="w-6 h-6 rounded-full bg-white/10 border border-white/20 flex items-center justify-center backdrop-blur-sm group-hover:bg-brand transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-3 h-3 text-white ml-0.5"><path d="M4.5 5.653c0-1.426 1.529-2.33 2.779-1.643l11.54 6.348c1.295.712 1.295 2.573 0 3.285L7.28 19.991c-1.25.687-2.779-.217-2.779-1.643V5.653z"/></svg>
                            </div>
                        </div>
                    </div>
                `;
            });

            // Injetar os elementos no início do container de vídeos para ficarem atrás dos degradês
            videoContainer.insertAdjacentHTML('afterbegin', videosHTML);
            thumbContainer.innerHTML = thumbsHTML;

            // Iniciar na primeira apresentação
            changeSlide(0);
            setupKeyboard();
        }

        function renderChart() {
            const ctx = document.getElementById('bullyingChart');
            if (!ctx) return;

            if (chartInstance) {
                chartInstance.destroy();
            }

            Chart.defaults.font.family = 'Inter';
            Chart.defaults.color = 'rgba(255, 255, 255, 0.7)';

            chartInstance = new Chart(ctx, {
                type: 'bar', // Alterado para barras horizontais para visual mais moderno
                data: {
                    labels: ['Verbal / Psicológico', 'Social / Exclusão', 'Físico', 'Cyberbullying'],
                    datasets: [{
                        label: 'Incidência (%)',
                        data: [45, 25, 15, 15],
                        backgroundColor: [
                            '#E50914', // Brand
                            'rgba(255, 255, 255, 0.8)',
                            'rgba(255, 255, 255, 0.5)',
                            'rgba(255, 255, 255, 0.3)'
                        ],
                        borderRadius: 6,
                        borderWidth: 0,
                    }]
                },
                options: {
                    indexAxis: 'y', // Barras horizontais
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(0,0,0,0.8)',
                            titleFont: { size: 13, family: 'Montserrat' },
                            bodyFont: { size: 14 },
                            padding: 12,
                            displayColors: false,
                            callbacks: {
                                label: function(context) {
                                    return context.parsed.x + '% dos casos';
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: 'rgba(255,255,255,0.05)', drawBorder: false },
                            ticks: { display: false }
                        },
                        y: {
                            grid: { display: false, drawBorder: false },
                            ticks: { font: { weight: '500' } }
                        }
                    }
                }
            });
        }

        function changeSlide(index) {
            currentSlide = index;
            const data = slidesData[index];

            // 1. Atualizar Barra de Progresso
            const progressPercentage = ((index + 1) / slidesData.length) * 100;
            document.getElementById('progress-bar').style.width = `${progressPercentage}%`;

            // 2. Animação de Saída/Entrada do Texto (Reflow)
            const wrapper = document.getElementById('content-wrapper');
            wrapper.classList.remove('anim-scale-in');
            void wrapper.offsetWidth; // Trigger reflow
            wrapper.classList.add('anim-scale-in');
            wrapper.classList.remove('opacity-0'); // Garante que fica visível

            // Atualizar conteúdo textual
            document.getElementById('slide-badge').innerText = data.badge;
            document.getElementById('slide-title').innerText = data.title;
            document.getElementById('slide-desc').innerHTML = data.description;

            // 3. Controlar Transição dos Vídeos de Fundo e SOM
            slidesData.forEach((slideItem, i) => {
                const videoEl = document.getElementById(`video-slide-${i}`);
                const thumbEl = document.getElementById(`thumb-${i}`);
                const iframeEl = document.getElementById(`iframe-slide-${i}`);

                if (i === index) {
                    // Vídeo Ativo
                    videoEl.classList.remove('opacity-0', 'z-0');
                    videoEl.classList.add('opacity-100', 'z-10');
                    
                    // Thumbnail Ativo
                    thumbEl.className = "group relative w-[160px] h-[90px] sm:w-[200px] sm:h-[110px] md:w-[280px] md:h-[120px] rounded-xl overflow-hidden cursor-pointer flex-shrink-0 transition-all duration-500 ease-out border-2 border-brand scale-[1.05] md:-translate-x-4 shadow-[0_10px_30px_rgba(229,9,20,0.4)] z-10 transform bg-black";

                    // Se for o slide com som (Encerramento), manda a ordem para desativar o Mudo
                    if (slideItem.playSound && iframeEl && iframeEl.contentWindow) {
                        iframeEl.contentWindow.postMessage('{"event":"command","func":"unMute","args":""}', '*');
                    }

                } else {
                    // Vídeos Inativos
                    videoEl.classList.remove('opacity-100', 'z-10');
                    videoEl.classList.add('opacity-0', 'z-0');

                    // Thumbnails Inativos
                    thumbEl.className = "group relative w-[160px] h-[90px] sm:w-[200px] sm:h-[110px] md:w-[280px] md:h-[120px] rounded-xl overflow-hidden cursor-pointer flex-shrink-0 transition-all duration-500 ease-out border border-white/10 opacity-50 hover:opacity-100 hover:scale-[1.02] transform bg-black/50 backdrop-blur-md";

                    // Mandar calar todos os outros vídeos que fiquem inativos (por precaução)
                    if (iframeEl && iframeEl.contentWindow) {
                        iframeEl.contentWindow.postMessage('{"event":"command","func":"mute","args":""}', '*');
                    }
                }
            });

            // 4. Renderizar Gráfico se aplicável
            if (data.hasChart) {
                setTimeout(() => { renderChart(); }, 300); // Delay para esperar a animação de entrada
            }

            // 5. Scroll suave automático na lista de thumbnails
            const thumbToScroll = document.getElementById(`thumb-${index}`);
            if(thumbToScroll) {
                thumbToScroll.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        }

        // Sistema de Navegação via Teclado
        function setupKeyboard() {
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') {
                    if (currentSlide < slidesData.length - 1) changeSlide(currentSlide + 1);
                } 
                else if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') {
                    if (currentSlide > 0) changeSlide(currentSlide - 1);
                }
            });
        }

        // Iniciar assim que a página carregar
        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
